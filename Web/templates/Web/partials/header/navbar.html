{% load static %}
<header class="ua-site-nav {% if theme == 'dark' %}ua-site-nav--ink{% else %}ua-site-nav--light{% endif %}" data-site-nav>
  <div class="ua-site-nav__inner">
    <a href="{% url 'packages' %}" class="ua-site-nav__explore" aria-label="Explore Unwind Africa packages">
      <span class="ua-site-nav__search-mark" aria-hidden="true"></span>
      <span class="ua-site-nav__label">Experiences</span>
    </a>

    <a href="{% url 'home' %}" class="ua-site-nav__brand" aria-label="Unwind Africa home">
      <img src="{% static 'assets/LOGO.png' %}" alt="Unwind Africa">
    </a>

    <button type="button" class="ua-site-nav__menu-button" data-menu-open aria-controls="hamburgerMenu" aria-expanded="false">
      <span class="ua-site-nav__label">Menu</span>
      <span class="ua-site-nav__dots" aria-hidden="true"><i></i><i></i></span>
    </button>
  </div>
</header>

<script>
(() => {
  const nav = document.querySelector('[data-site-nav]');
  if (!nav || nav.dataset.scrollReady === 'true') return;
  nav.dataset.scrollReady = 'true';

  let lastY = window.scrollY;
  let ticking = false;

  const update = () => {
    const currentY = window.scrollY;
    const isScrolled = currentY > 48;
    const goingDown = currentY > lastY && currentY > 150;

    nav.classList.toggle('is-scrolled', isScrolled);
    nav.classList.toggle('is-hidden', goingDown && !document.body.classList.contains('ua-menu-open'));

    lastY = Math.max(currentY, 0);
    ticking = false;
  };

  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(update);
      ticking = true;
    }
  }, { passive: true });

  update();
})();
</script>
