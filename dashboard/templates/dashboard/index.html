{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unwind Africa — Admin</title>

  <!-- Tell Tailwind to use class-based dark mode BEFORE loading the CDN -->
  <script>
    window.tailwind = { config: { darkMode: 'class' } };
  </script>
   <script defer src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" href="{% static 'favicon.ico' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- External Libraries loaded in partials/scripts.html -->

  <!-- Minimal custom CSS (light = default, dark overrides under .dark) -->
  <style>
    :root { --brand:#8E7CFF; --brand2:#51E1A7; --ring: rgba(142,124,255,.35); }

    /* Full-screen canvas */
    .board {
      width: 100vw;
      height: 100vh;
      margin: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }

    /*  cards */
    .card { backdrop-filter: blur(12px) saturate(120%); background:#fff; border:1px solid #eef0f6; }
    .dark .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,.14); }

    .shadow-soft { box-shadow: 0 18px 42px rgba(10,16,30,.08); }
    .dark .shadow-soft { box-shadow: 0 20px 60px rgba(0,0,0,.20); }

    /* Chart panel gradient */
    .panel-sky{
      background: linear-gradient(180deg, #EAF7FB, #F5FBFD);
      border: 1px solid #d8eef6;
    }
    .dark .panel-sky{
      background: linear-gradient(180deg, rgba(95,200,230,.22), rgba(95,200,230,.08));
      border-color: rgba(95,200,230,.22);
    }

    /* KPIs */
    .kpi{ display:grid; gap:.25rem; padding:1rem; border-radius:18px; border:1px solid #eef0f6; }
    .dark .kpi{ background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); }

    /* Focus ring helper for inputs */
    .ring-brand:focus{ outline: none; box-shadow: 0 0 0 4px var(--ring); }

    /* Sidebar links */
    .side-link{
      position:relative; display:flex; align-items:center; gap:.65rem;
      border-radius:14px; padding:.65rem 1rem; font-weight:700; border:1px solid transparent;
      transition: .18s ease;
    }
    .side-link:hover{
      background: linear-gradient(135deg, rgba(142,124,255,.12), rgba(81,225,167,.10));
      border-color: rgba(142,124,255,.30);
    }
    .side-link.active{
      background: linear-gradient(135deg, rgba(142,124,255,.18), rgba(81,225,167,.14));
      border-color: rgba(142,124,255,.45);
    }
    .side-link::before{
      content:""; position:absolute; left:6px; top:50%; transform:translateY(-50%);
      width:0; height:70%; border-radius:999px; background: linear-gradient(180deg, var(--brand), var(--brand2));
      transition: width .18s ease;
    }
    .side-link.active::before, .side-link:focus-visible::before{ width:6px; }

    /* Form field base */
    .field{
      width:100%; border-radius:14px; border:1px solid #e7eaf3; padding:.65rem 1rem;
      background:#fff; color:#0f1320;
    }
    .dark .field{ background: rgba(255,255,255,.08); color:#E6E8F3; border-color: rgba(255,255,255,.18); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(100,100,120,.35); border-radius: 999px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(180,180,200,.25); }
  </style>
</head>

<!-- Light defaults + dark overrides -->
<body x-data="app()" x-init="init()" class="h-screen w-screen font-[Inter] antialiased bg-[#070912] text-white">

  <div class="board">
    <div class="flex h-screen">
      <!-- Sidebar -->
      <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
             class="fixed md:static z-40 inset-y-0 left-0 w-72 p-5 transition-transform duration-300">
        <div class=" shadow-soft rounded-3xl h-full flex flex-col">
          <div class="flex items-center justify-between px-3 py-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl grid place-items-center shadow-md"
                   style="background: linear-gradient(135deg, var(--brand), #705CFF);">
                <i class="fa-solid fa-sparkles text-white"></i>
              </div>
              <div>
                <div class="text-lg font-extrabold">Unwind Admin</div>
                <div class="text-xs opacity-70">Dashboard</div>
              </div>
            </div>
            <button class="md:hidden btn-ghost" @click="sidebarOpen=false" aria-label="Close sidebar">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <nav class="px-2 py-4 grid gap-3 text-sm overflow-auto">
            <div class="px-4 mt-2 mb-1 text-xs uppercase tracking-wider font-bold opacity-60">Main</div>

            <button @click="setTab('overview')" :class="tab==='overview' ? 'side-link active' : 'side-link'"
                    :aria-current="tab==='overview' ? 'page' : null">
              <i class="fa-solid fa-chart-line w-5 text-purple-600 dark:text-purple-400"></i>
              <span class="leading-none">Overview</span>
              <span class="ml-auto badge-soft border border-black/10 text-[10px] px-2 py-[2px] rounded-full
                           dark:border-white/20">Live</span>
            </button>

            <button @click="setTab('charts')" :class="tab==='charts' ? 'side-link active' : 'side-link'"
                    :aria-current="tab==='charts' ? 'page' : null">
              <i class="fa-solid fa-chart-pie w-5 text-emerald-600 dark:text-emerald-400"></i>
              <span class="leading-none">Charts</span>
            </button>

            <button @click="setTab('notifications')" :class="tab==='notifications' ? 'side-link active' : 'side-link'">
              <i class="fa-solid fa-bell w-5 text-orange-600 dark:text-orange-300"></i><span class="leading-none">Notifications</span>
              <span class="ml-auto badge-soft border border-black/10 text-[10px] px-2 py-[2px] rounded-full
                           dark:border-white/20">{{ notifications|length }}</span>
            </button>

            <div class="px-4 mt-4 mb-1 text-xs uppercase tracking-wider font-bold opacity-60">Content</div>

            <button @click="setTab('create_blog')" :class="tab==='create_blog' ? 'side-link active' : 'side-link'">
              <i class="fa-solid fa-pen w-5 text-yellow-600 dark:text-yellow-300"></i><span class="leading-none">Create Blog</span>
            </button>

            <button @click="setTab('blogs')" :class="tab==='blogs' ? 'side-link active' : 'side-link'">
              <i class="fa-solid fa-table-list w-5 text-cyan-700 dark:text-cyan-300"></i><span class="leading-none">Blogs List</span>
            </button>

            <button @click="setTab('events')" :class="tab==='events' ? 'side-link active' : 'side-link'">
              <i class="fa-solid fa-calendar-days w-5 text-pink-600 dark:text-pink-300"></i><span class="leading-none">Events</span>
            </button>

            <button @click="setTab('voting')" :class="tab==='voting' ? 'side-link active' : 'side-link'">
              <i class="fa-solid fa-vote-yea w-5 text-blue-600 dark:text-blue-300"></i><span class="leading-none">Voting</span>
            </button>

            <button @click="setTab('rest_cards')" :class="tab==='rest_cards' ? 'side-link active' : 'side-link'">
              <i class="fa-solid fa-id-card w-5 text-purple-600 dark:text-purple-300"></i><span class="leading-none">Rest Cards</span>
            </button>

            <div class="mt-4 h-px bg-black/10 dark:bg-white/10"></div>
            <a href="/" class="side-link"><i class="fa-solid fa-globe w-5"></i><span class="leading-none">View site</span></a>
          </nav>

          <div class="mt-auto p-4 grid gap-3">
            <div class=" rounded-2xl p-4">
              <div class="text-xs opacity-70 mb-1">Storage</div>
              <div class="w-full h-2 bg-black/10 dark:bg-white/10 rounded-full overflow-hidden">
                <div class="h-full rounded-full" style="width:55%; background: linear-gradient(90deg, var(--brand), var(--brand2));"></div>
              </div>
              <div class="text-xs mt-1 opacity-80">5.5 GB / 10 GB</div>
            </div>
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="w-full btn-ghost border border-red-300 hover:border-red-500/60 text-red-600 dark:text-red-400 dark:border-red-500/30">
                <i class="fa-solid fa-right-from-bracket mr-2"></i>Logout
              </button>
            </form>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class=" shadow-soft rounded-2xl px-4 py-3 flex items-center gap-3 m-4 md:m-6">
          <button class="md:hidden btn-ghost" @click="sidebarOpen=true" aria-label="Open sidebar"><i class="fa-solid fa-bars"></i></button>
          <div class="relative flex-1 max-w-xl">
            <input type="search" placeholder="Search posts, events, users…" class="field ring-brand" />
            <span class="absolute right-2 top-1/2 -translate-y-1/2 text-xs opacity-70">/</span>
          </div>
          <button @click="setTab('notifications')" class="btn-ghost relative" aria-label="Notifications">
            <i class="fa-regular fa-bell"></i>
            <span class="absolute -top-1 -right-1 inline-flex items-center justify-center w-4 h-4 text-[10px] rounded-full text-white"
                  style="background: linear-gradient(135deg, var(--brand), #705CFF);">{{ notifications|length }}</span>
          </button>
          <!-- Pixabay avatar -->
          <div class="w-9 h-9 rounded-full overflow-hidden ring-2 ring-white/20">
            <img
              src="https://cdn.pixabay.com/photo/2016/08/08/09/17/avatar-1577909_1280.png"
              alt="Admin"
              class="w-full h-full object-cover"
              referrerpolicy="no-referrer"
            />
          </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 p-4 md:p-6 overflow-auto">
        <!-- Notifications -->
        <div class="fixed bottom-6 right-6 z-50 w-80">
          <div class="rounded-2xl shadow-lg overflow-hidden border border-gray-200 dark:border-gray-800">
              <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-4 text-white">
              <h3 class="font-bold flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                  <i class="fa-solid fa-bell"></i>
                  Notifications
                </div>
                <button @click="notificationsOpen = !notificationsOpen" class="text-white hover:bg-white/20 rounded-full p-1 transition-colors">
                  <i :class="notificationsOpen ? 'fa-solid fa-chevron-down' : 'fa-solid fa-chevron-up'"></i>
                </button>
              </h3>
            </div>
            <div x-show="notificationsOpen" x-transition class="bg-white dark:bg-gray-900 p-4 max-h-96 overflow-y-auto">
              <template x-if="notifications.length === 0">
                <div class="text-center py-8 text-gray-500 dark:text-gray-400">
                  <i class="fa-solid fa-inbox text-4xl mb-2 opacity-50"></i>
                  <p class="text-sm">No notifications</p>
                </div>
              </template>
              <template x-if="notifications.length > 0">
                <div class="space-y-3">
                  <template x-for="notification in notifications" :key="notification.id">
                    <div class="p-3 rounded-lg bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                      <div class="flex items-start gap-3">
                        <div class="mt-1">
                          <template x-if="notification.type === 'success'"><i class="fa-solid fa-check-circle text-green-500"></i></template>
                          <template x-if="notification.type === 'warning'"><i class="fa-solid fa-exclamation-circle text-yellow-500"></i></template>
                          <template x-if="notification.type === 'error'"><i class="fa-solid fa-times-circle text-red-500"></i></template>
                          <template x-if="notification.type === 'info'"><i class="fa-solid fa-info-circle text-blue-500"></i></template>
                        </div>
                        <div class="flex-1 min-w-0">
                          <p class="text-sm font-medium text-gray-900 dark:text-white" x-text="notification.message"></p>
                          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1" x-text="notification.time"></p>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Campaign Modal -->
        <div x-show="showCampaignModal" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
          <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200 dark:border-gray-800">
              <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold" x-text="editingCampaign ? 'Edit Campaign' : 'Create Campaign'"></h3>
                <button @click="closeCampaignModal()" class="btn-ghost text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                  <i class="fa-solid fa-xmark text-xl"></i>
                </button>
              </div>
            </div>

            <div class="p-6">
              <form x-bind:action="campaignFormAction" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="grid md:grid-cols-2 gap-4">
                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Campaign Name</label>
                    <input type="text" x-model="campaignForm.name" name="name" class="field ring-brand w-full" placeholder="Enter campaign name" required>
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tagline</label>
                    <input type="text" x-model="campaignForm.tagline" name="tagline" class="field ring-brand w-full" placeholder="Short tagline for the campaign">
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description</label>
                    <textarea x-model="campaignForm.description" name="description" class="field ring-brand w-full" rows="4" placeholder="Campaign description"></textarea>
                  </div>

                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Start Date</label>
                    <input type="date" x-model="campaignForm.start_date" name="start_date" class="field ring-brand w-full" required>
                  </div>

                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">End Date</label>
                    <input type="date" x-model="campaignForm.end_date" name="end_date" class="field ring-brand w-full" required>
                  </div>

                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Vote Price (₦)</label>
                    <input type="number" x-model="campaignForm.vote_price" name="vote_price" class="field ring-brand w-full" placeholder="500" min="0" step="100" required>
                  </div>

                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Rest Points per Vote</label>
                    <input type="number" x-model="campaignForm.rest_points_per_vote" name="rest_points_per_vote" class="field ring-brand w-full" placeholder="100" min="0" step="10" required>
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Grand Prize</label>
                    <input type="text" x-model="campaignForm.grand_prize" name="grand_prize" class="field ring-brand w-full" placeholder="Grand prize description">
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Grand Prize Description</label>
                    <textarea x-model="campaignForm.grand_prize_description" name="grand_prize_description" class="field ring-brand w-full" rows="3" placeholder="Detailed grand prize description"></textarea>
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Second Prize</label>
                    <input type="text" x-model="campaignForm.second_prize" name="second_prize" class="field ring-brand w-full" placeholder="Second prize description">
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Second Prize Description</label>
                    <textarea x-model="campaignForm.second_prize_description" name="second_prize_description" class="field ring-brand w-full" rows="3" placeholder="Detailed second prize description"></textarea>
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Third Prize</label>
                    <input type="text" x-model="campaignForm.third_prize" name="third_prize" class="field ring-brand w-full" placeholder="Third prize description">
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Third Prize Description</label>
                    <textarea x-model="campaignForm.third_prize_description" name="third_prize_description" class="field ring-brand w-full" rows="3" placeholder="Detailed third prize description"></textarea>
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Prize Description</label>
                    <textarea x-model="campaignForm.prize_description" name="prize_description" class="field ring-brand w-full" rows="3" placeholder="Overall prizes description"></textarea>
                  </div>

                  <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Banner Image</label>
                    <input type="file" x-model="campaignForm.banner_image" name="banner_image" class="field ring-brand w-full" accept="image/*">
                  </div>

                  <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Active</label>
                    <input type="checkbox" x-model="campaignForm.is_active" name="is_active" class="field ring-brand" checked>
                  </div>
                </div>

                <div class="mt-6 flex justify-end gap-3">
                  <button type="button" @click="closeCampaignModal()" class="btn-ghost border border-gray-300 hover:border-gray-400">Cancel</button>
                  <button type="submit" class="btn-primary">
                    <span x-text="editingCampaign ? 'Update Campaign' : 'Create Campaign'"></span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Content Switcher -->
        <main class="grid gap-6">
          <!-- OVERVIEW -->
          <template x-if="tab==='overview'">
            <section class="grid gap-6">
              <!-- KPIs -->
              <div class="grid md:grid-cols-4 sm:grid-cols-2 gap-4">
                <div class="kpi">
                  <div class="text-xs opacity-70">Total Sessions</div>
                  <div class="text-2xl font-extrabold">{{ kpis.total_sessions|default:"—" }}</div>
                  <div class="text-xs opacity-70">7d trend</div>
                </div>
                <div class="kpi">
                  <div class="text-xs opacity-70">Posts</div>
                  <div class="text-2xl font-extrabold">{{ kpis.posts_total|default:"—" }}</div>
                  <div class="text-xs opacity-70">
                    {% if kpis.posts_published and kpis.posts_featured %}
                      {{ kpis.posts_published }} published, {{ kpis.posts_featured }} featured
                    {% else %}
                      Total published & drafts
                    {% endif %}
                  </div>
                </div>
                <div class="kpi">
                  <div class="text-xs opacity-70">Events</div>
                  <div class="text-2xl font-extrabold">{{ kpis.events_count|default:"—" }}</div>
                  <div class="text-xs text-yellow-600 dark:text-yellow-400">
                    {% if kpis.pending_events %}{{ kpis.pending_events }} pending{% else %}Up to date{% endif %}
                  </div>
                </div>
                <div class="kpi">
                  <div class="text-xs opacity-70">Bounce Rate</div>
                  <div class="text-2xl font-extrabold">
                    {% if kpis.bounce_rate is not None %}{{ kpis.bounce_rate }}%{% else %}—{% endif %}
                  </div>
                  <div class="text-xs opacity-70">Site-wide</div>
                </div>
              </div>

              <!-- Chart + Quick actions -->
              <div class="grid lg:grid-cols-3 gap-6">
                <div class=" panel-sky rounded-2xl p-4 shadow-soft lg:col-span-2 h-[280px]">
                  <div class="flex items-center justify-between mb-3">
                    <h3 class="font-bold">Engagement (7d)</h3>
                    <div class="flex items-center gap-2 text-xs">
                      <button class="btn-ghost">7d</button>
                      <button class="btn-ghost">30d</button>
                      <button class="btn-ghost">90d</button>
                    </div>
                  </div>
                  <div class="h-[200px]"><canvas id="chart-overview"></canvas></div>
                </div>

                <div class="grid gap-3">
                  <div class=" rounded-2xl p-4 shadow-soft">
                    <h3 class="font-bold mb-2">Quick Actions</h3>
                    <div class="grid gap-2">
                      <a @click.prevent="setTab('create_blog')" href="#" class="btn-primary">Create Blog Post</a>
                      <button @click="openEventModal()" class="btn-ghost border border-purple-400/30 hover:border-purple-400/60">Schedule Event</button>
                      <a href="/tiaras-grateful-heart" class="btn-ghost border border-emerald-400/30 hover:border-emerald-400/60">Open Book Page</a>
                    </div>
                  </div>

                  <div class=" rounded-2xl p-4 shadow-soft">
                    <h3 class="font-bold mb-2">System</h3>
                    <ul class="text-sm space-y-1 opacity-80">
                      <li>Uptime <span class="text-emerald-600 dark:text-emerald-400 font-semibold">99.9%</span></li>
                      <li>API latency <span class="font-medium">220ms</span></li>
                      <li>Build <span class="font-mono">#{{ now|date:'Y.m.d' }}</span></li>
                    </ul>
                  </div>
                </div>
              </div>

              <div class=" rounded-2xl p-4 shadow-soft">
                {% include 'dashboard/partials/overview.html' %}
              </div>
            </section>
          </template>

          <!-- VOTING -->
          <template x-if="tab==='voting'">
            <section class="grid gap-6">
              <div class="grid md:grid-cols-4 sm:grid-cols-2 gap-4">
                <div class="kpi">
                  <div class="text-xs opacity-70">Total Campaigns</div>
                  <div class="text-2xl font-extrabold">{{ campaigns.count }}</div>
                  <div class="text-xs opacity-70">Active campaigns</div>
                </div>
                <div class="kpi">
                  <div class="text-xs opacity-70">Total Nominees</div>
                  <div class="text-2xl font-extrabold">{{ nominees.count }}</div>
                  <div class="text-xs opacity-70">Across all campaigns</div>
                </div>
                <div class="kpi">
                  <div class="text-xs opacity-70">Total Votes</div>
                  <div class="text-2xl font-extrabold">{{ votes.count }}</div>
                  <div class="text-xs opacity-70">Cast votes</div>
                </div>
                <div class="kpi">
                  <div class="text-xs opacity-70">Total Revenue</div>
                  <div class="text-2xl font-extrabold">
                    {% with total=total_revenue %}
                      {% if total %}₦{{ total|floatformat:0 }}{% else %}₦0{% endif %}
                    {% endwith %}
                  </div>
                  <div class="text-xs opacity-70">From successful transactions</div>
                </div>
              </div>

              <!-- Main Content Grid -->
              <div class="grid lg:grid-cols-3 gap-6">
                <!-- Campaign Management -->
                <div class="lg:col-span-2 rounded-2xl p-6 shadow-soft bg-white/5 border border-white/10">
                  <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Voting Campaigns</h3>
                    <button @click="openCampaignModal()" class="btn-primary">Create Campaign</button>
                  </div>
                  <div class="space-y-4">
                    {% for campaign in campaigns %}
                    <div class="p-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                      <div class="flex justify-between items-start">
                        <div class="flex-1">
                          <h4 class="font-bold text-lg">{{ campaign.name }}</h4>
                          <p class="text-sm opacity-70 mt-1">{{ campaign.tagline|default:campaign.description|truncatechars:60 }}</p>
                          <p class="text-sm opacity-70 mt-1">{{ campaign.start_date }} - {{ campaign.end_date }}</p>
                        </div>
                        <span class="px-3 py-1 text-xs rounded-full {% if campaign.is_ongoing %}bg-green-500/20 text-green-400 border border-green-500/30{% else %}bg-gray-500/20 text-gray-400 border border-gray-500/30{% endif %}">
                          {% if campaign.is_ongoing %}Active{% else %}Ended{% endif %}
                        </span>
                      </div>
                      <div class="mt-4 grid grid-cols-2 gap-4 text-sm">
                        <div>
                          <span class="opacity-70">Nominees:</span>
                          <span class="font-bold">{{ campaign.nominees.count }}</span>
                        </div>
                        <div>
                          <span class="opacity-70">Total Votes:</span>
                          <span class="font-bold">{{ campaign.total_votes }}</span>
                        </div>
                      </div>
                      <div class="mt-4 flex gap-3">
                        <button @click="editCampaign('{{ campaign.id }}', '{{ campaign.name }}', '{{ campaign.tagline }}', '{{ campaign.description }}', '{{ campaign.start_date|date:"Y-m-d" }}', '{{ campaign.end_date|date:"Y-m-d" }}', '{{ campaign.vote_price }}', '{{ campaign.rest_points_per_vote }}', '{{ campaign.grand_prize }}', '{{ campaign.grand_prize_description }}', '{{ campaign.second_prize }}', '{{ campaign.second_prize_description }}', '{{ campaign.third_prize }}', '{{ campaign.third_prize_description }}', '{{ campaign.prize_description }}', '{% if campaign.banner_image %}{{ campaign.banner_image.url }}{% else %}{% endif %}', '{{ campaign.is_active }}')" class="text-sm btn-ghost border border-blue-400/30 hover:border-blue-400/60">Edit</button>
                        <a href="{% url 'view_campaign_voters' campaign.slug %}" class="text-sm btn-ghost border border-green-400/30 hover:border-green-400/60">View Voters</a>
                      </div>
                    </div>
                    {% endfor %}
                  </div>
                </div>

                <!-- Right Sidebar - Statistics and Recent Activity -->
                <div class="grid gap-6">
                  <!-- Top Nominees -->
                  <div class="rounded-2xl p-6 shadow-soft bg-white/5 border border-white/10">
                    <h3 class="text-lg font-bold mb-4">Top Nominees</h3>
                    <div class="space-y-4">
                      {% for nominee in nominees|slice:":5" %}
                      <div class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                        <div class="flex items-center gap-3">
                          {% if nominee.photo %}
                          <img src="{{ nominee.photo.url }}" alt="{{ nominee.name }}" class="w-12 h-12 rounded-full object-cover border-2 border-white/10" />
                          {% else %}
                          <div class="w-12 h-12 rounded-full bg-gradient-to-r from-purple-500 to-blue-500 flex items-center justify-center font-bold text-white border-2 border-white/10">
                            {{ nominee.name|first|upper }}
                          </div>
                          {% endif %}
                          <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm truncate">{{ nominee.name }}</h4>
                            <p class="text-xs opacity-70 truncate">{{ nominee.campaign.name }}</p>
                          </div>
                          <span class="font-bold text-sm">{{ nominee.vote_count }} votes</span>
                        </div>
                      </div>
                      {% endfor %}
                    </div>
                  </div>

                  <!-- Recent Votes -->
                  <div class="rounded-2xl p-6 shadow-soft bg-white/5 border border-white/10">
                    <h3 class="text-lg font-bold mb-4">Recent Votes</h3>
                    <div class="space-y-4">
                      {% for vote in votes|slice:":5" %}
                      <div class="p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                        <div class="flex justify-between items-start">
                          <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm truncate">{{ vote.voter_name }}</h4>
                            <p class="text-xs opacity-70 truncate">{{ vote.voter_email }}</p>
                          </div>
                          <span class="text-xs opacity-70">{{ vote.created_at|timesince }} ago</span>
                        </div>
                        <div class="mt-2">
                          <span class="opacity-70 text-xs">Voted for:</span>
                          <span class="font-bold text-sm">{{ vote.nominee.name }}</span>
                        </div>
                        <div class="mt-1">
                          <span class="opacity-70 text-xs">Votes:</span>
                          <span class="font-bold text-sm">{{ vote.vote_quantity }}</span>
                        </div>
                      </div>
                      {% endfor %}
                    </div>
                  </div>
                </div>
              </div>

              <!-- Transaction History -->
              <div class="rounded-2xl p-6 shadow-soft bg-white/5 border border-white/10">
                <h3 class="text-xl font-bold mb-6">Transaction History</h3>
                <div class="overflow-x-auto">
                  <table class="w-full text-sm">
                    <thead>
                      <tr class="border-b border-white/10">
                        <th class="text-left py-3 font-semibold">Date</th>
                        <th class="text-left py-3 font-semibold">Voter</th>
                        <th class="text-left py-3 font-semibold">Nominee</th>
                        <th class="text-left py-3 font-semibold">Campaign</th>
                        <th class="text-left py-3 font-semibold">Votes</th>
                        <th class="text-left py-3 font-semibold">Amount</th>
                        <th class="text-left py-3 font-semibold">Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {% for transaction in transactions|slice:":10" %}
                      <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="py-3">{{ transaction.created_at }}</td>
                        <td class="py-3">{{ transaction.voter_name }}</td>
                        <td class="py-3">{{ transaction.nominee.name }}</td>
                        <td class="py-3">{{ transaction.campaign.name }}</td>
                        <td class="py-3">{{ transaction.vote_count }}</td>
                        <td class="py-3">₦{{ transaction.amount|floatformat:0 }}</td>
                        <td class="py-3">
                          <span class="px-3 py-1 text-xs rounded-full {% if transaction.status == 'success' %}bg-green-500/20 text-green-400 border border-green-500/30{% elif transaction.status == 'pending' %}bg-yellow-500/20 text-yellow-400 border border-yellow-500/30{% else %}bg-red-500/20 text-red-400 border border-red-500/30{% endif %}">
                            {{ transaction.status }}
                          </span>
                        </td>
                      </tr>
                      {% endfor %}
                    </tbody>
                  </table>
                </div>
              </div>


            </section>
          </template>

          <!-- REST CARDS -->
          <template x-if="tab==='rest_cards'">
            <section class="grid gap-6">
               <div class="grid md:grid-cols-4 sm:grid-cols-2 gap-4">
                <div class="kpi">
                    <div class="text-xs opacity-70">Total Cards</div>
                    <div class="text-2xl font-extrabold"><span id="restCardsTotal">{{ rest_cards.count }}</span></div>
                    <div class="text-xs opacity-70">All cards issued</div>
                  </div>
                  <div class="kpi">
                    <div class="text-xs opacity-70">Active Cards</div>
                    <div class="text-2xl font-extrabold"><span id="restCardsActive">{{ active_cards.count }}</span></div>
                    <div class="text-xs opacity-70">Currently active</div>
                  </div>
                  <div class="kpi">
                    <div class="text-xs opacity-70">Pending Activation</div>
                    <div class="text-2xl font-extrabold"><span id="restCardsPending">{{ pending_cards.count }}</span></div>
                    <div class="text-xs opacity-70">Awaiting activation</div>
                  </div>
                  <div class="kpi">
                    <div class="text-xs opacity-70">Total Rest Points</div>
                    <div class="text-2xl font-extrabold"><span id="restCardsPoints">{{ total_rest_points|default:"0" }}</span></div>
                    <div class="text-xs opacity-70">Across all cards</div>
                  </div>
              </div>

              <!-- Rest Cards Management -->
              <div class="rounded-2xl p-6 shadow-soft bg-white/5 border border-white/10">
                <div class="flex justify-between items-center mb-6">
                  <h3 class="text-xl font-bold">Rest Cards Management</h3>
                    <div class="flex gap-2">
                    <button @click="createRestCard()" class="btn-primary">Generate New Card</button>
                    <button class="btn-ghost border border-emerald-400/30 hover:border-emerald-400/60" @click="exportRestCards()">
                      <i class="fa-solid fa-file-export mr-2"></i>Export List
                    </button>
                    <button class="btn-ghost border border-purple-400/30 hover:border-purple-400/60" @click="importRestCards()">
                      <i class="fa-solid fa-file-import mr-2"></i>Import CSV
                    </button>
                  </div>
                </div>
                <div class="overflow-x-auto">
                  <table class="w-full text-sm">
                    <thead>
                      <tr class="border-b border-white/10">
                        <th class="text-left py-3 font-semibold">Card Number</th>
                        <th class="text-left py-3 font-semibold">Member Name</th>
                        <th class="text-left py-3 font-semibold">Email</th>
                        <th class="text-left py-3 font-semibold">Phone</th>
                        <th class="text-left py-3 font-semibold">Status</th>
                        <th class="text-left py-3 font-semibold">Rest Points</th>
                        <th class="text-left py-3 font-semibold">Issue Date</th>
                        <th class="text-left py-3 font-semibold">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {% for card in rest_cards %}
                      <tr class="border-b border-white/5 hover:bg-white/5 transition-colors" data-card-id="{{ card.id }}">
                        <td class="py-3 font-mono">{{ card.card_number }}</td>
                        <td class="py-3">{{ card.member_name }}</td>
                        <td class="py-3">{{ card.member_email }}</td>
                        <td class="py-3">{{ card.member_phone }}</td>
                        <td class="py-3">
                          <span data-status class="px-3 py-1 text-xs rounded-full {% if card.status == 'active' %}bg-green-500/20 text-green-400 border border-green-500/30{% elif card.status == 'pending' %}bg-yellow-500/20 text-yellow-400 border border-yellow-500/30{% elif card.status == 'suspended' %}bg-red-500/20 text-red-400 border border-red-500/30{% else %}bg-gray-500/20 text-gray-400 border border-gray-500/30{% endif %}">
                            {{ card.status }}
                          </span>
                        </td>
                        <td class="py-3">{{ card.total_rest_points }}</td>
                        <td class="py-3">{{ card.activated_at|date:"M d, Y"|default:"-" }}</td>
                        <td class="py-3">
                            <div class="flex gap-2">
                              <button @click="editRestCard({{ card.id }})" class="text-xs btn-ghost border border-blue-400/30 hover:border-blue-400/60">Edit</button>
                              <button @click="generateRestCard({{ card.id }})" class="text-xs btn-ghost border border-purple-400/30 hover:border-purple-400/60">Generate Card</button>
                              <button @click="resendRestCard({{ card.id }})" class="text-xs btn-ghost border border-orange-400/30 hover:border-orange-400/60">Resend</button>
                              <button @click="toggleRestCardStatus({{ card.id }}, '{{ card.status }}', $event)" class="text-xs btn-ghost border border-red-400/30 hover:border-red-400/60">
                                {% if card.status == 'active' %}Deactivate{% else %}Activate{% endif %}
                              </button>
                            </div>
                        </td>
                      </tr>
                      {% endfor %}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>
          </template>

          <!-- NOTIFICATIONS -->
          <template x-if="tab==='notifications'">
            <section class="grid gap-6">
              <div class="rounded-2xl p-6 shadow-soft bg-white/5 border border-white/10">
                <h3 class="text-xl font-bold mb-6">Notifications</h3>
                <div class="space-y-4">
                  <template x-if="notifications.length === 0">
                    <div class="text-center py-8 text-gray-500 dark:text-gray-400">
                      <i class="fa-solid fa-inbox text-4xl mb-2 opacity-50"></i>
                      <p class="text-sm">No notifications</p>
                    </div>
                  </template>
                  <template x-if="notifications.length > 0">
                    <div class="space-y-3">
                      <template x-for="notification in notifications" :key="notification.id">
                        <div class="p-4 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                          <div class="flex items-start gap-3">
                            <div class="mt-1">
                              <template x-if="notification.type === 'success'"><i class="fa-solid fa-check-circle text-green-500"></i></template>
                              <template x-if="notification.type === 'warning'"><i class="fa-solid fa-exclamation-circle text-yellow-500"></i></template>
                              <template x-if="notification.type === 'error'"><i class="fa-solid fa-times-circle text-red-500"></i></template>
                              <template x-if="notification.type === 'info'"><i class="fa-solid fa-info-circle text-blue-500"></i></template>
                            </div>
                            <div class="flex-1 min-w-0">
                              <p class="text-sm font-medium text-gray-900 dark:text-white" x-text="notification.message"></p>
                              <p class="text-xs text-gray-500 dark:text-gray-400 mt-1" x-text="notification.time"></p>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </section>
          </template>

          <!-- CHARTS -->
          <template x-if="tab==='charts'">
            <section class="grid gap-6">
              <div class=" rounded-2xl p-4 shadow-soft">
                {% include 'dashboard/partials/charts.html' %}
              </div>
            </section>
          </template>

          <!-- CREATE BLOG -->
          <template x-if="tab==='create_blog'">
            <section class="grid gap-6">
              <div class=" rounded-2xl p-4 shadow-soft">
                {% include 'dashboard/partials/blog_form.html' with blog_form=post_form only %}
              </div>
            </section>
          </template>

          <!-- BLOGS LIST -->
          <template x-if="tab==='blogs'">
            <section class="grid gap-6">
              <div class=" rounded-2xl p-4 shadow-soft">
                {% include 'dashboard/partials/blog_cards.html' %}
              </div>
            </section>
          </template>

          <!-- EVENTS -->
          <template x-if="tab==='events'">
            <section class="grid gap-6">
              <div class="flex justify-between items-center">
                <h3 class="font-bold text-lg">Events</h3>
                <div class="flex gap-2">
                  <button @click="openEventModal()" class="btn-primary"><i class="fa-solid fa-plus mr-2"></i>New Event</button>
                  <button class="btn-ghost border border-emerald-400/30 hover:border-emerald-400/60"><i class="fa-solid fa-file-export mr-2"></i>Export</button>
                </div>
              </div>
              <div class=" rounded-2xl p-4 shadow-soft">
                {% include 'dashboard/partials/event_cards.html' %}
              </div>
            </section>
          </template>
        </main>

        <footer class="text-xs opacity-70 py-4 text-center">© {{ now|date:'Y' }} Unwind Africa • Built with ❤</footer>
      </div>
    </div>
  </div>

  <!-- Event Modal -->
  <div id="eventModal" x-show="showEventModal" x-transition.opacity class="fixed inset-0 z-50 grid place-items-center p-4" x-cloak>
    <div class="absolute inset-0 bg-black/50" @click="closeEventModal()"></div>
    <div class="relative w-full max-w-2xl  rounded-3xl shadow-soft p-6 overflow-y-auto max-h-[90vh]">
      <h2 class="text-xl font-bold mb-4" x-text="editingEvent ? 'Edit Event' : 'Add Event'"></h2>
      <form method="post" :action="eventFormAction" enctype="multipart/form-data" class="grid gap-3">
        {% csrf_token %}
        <label class="text-sm font-medium">Event Name</label>
        <input type="text" name="name" x-model="eventForm.name" class="field ring-brand" required>

        <label class="text-sm font-medium">Description</label>
        <textarea name="description" x-model="eventForm.description" rows="4" class="field ring-brand" required></textarea>

        <div class="grid md:grid-cols-3 gap-3">
          <div>
            <label class="text-sm font-medium">Date</label>
            <input type="date" name="date" x-model="eventForm.date" class="field ring-brand w-full" required>
          </div>
          <div class="md:col-span-2">
            <label class="text-sm font-medium">Location</label>
            <input type="text" name="location" x-model="eventForm.location" class="field ring-brand w-full" required>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium">Thumbnail</label>
            <template x-if="eventForm.thumbnail"><img :src="eventForm.thumbnail" alt="Current Thumbnail" class="w-32 h-32 object-cover rounded-xl mb-2"></template>
            <input type="file" name="thumbnail" class="field ring-brand file:mr-3 file:px-3 file:py-2 file:rounded-lg file:border-0 file:text-white file:cursor-pointer file:bg-gradient-to-r file:from-purple-500 file:to-indigo-500 w-full text-sm">
          </div>
          <div>
            <label class="text-sm font-medium">Event Flier</label>
            <template x-if="eventForm.flier"><img :src="eventForm.flier" alt="Current Flier" class="w-32 h-32 object-cover rounded-xl mb-2"></template>
            <input type="file" name="flier" class="field ring-brand file:mr-3 file:px-3 file:py-2 file:rounded-lg file:border-0 file:text-white file:cursor-pointer file:bg-gradient-to-r file:from-emerald-500 file:to-teal-500 w-full text-sm">
          </div>
        </div>

        <div class="flex justify-end gap-2 pt-2">
          <button type="button" @click="closeEventModal()" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Rest Card Edit Modal -->
  <div x-show="showRestCardModal" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-gray-200 dark:border-gray-800">
        <div class="flex justify-between items-center">
          <h3 class="text-xl font-bold">Edit Rest Card</h3>
          <button @click="showRestCardModal = false" class="btn-ghost text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>
      </div>

      <div class="p-6">
         <template x-if="restCardModal && restCardModal.id">
          <form x-data="{ card: restCardModal, submit() {
            const csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value;
            if (!csrf) return alert('CSRF token missing');
            fetch(`/dashboard/rest-cards/${this.card.id}/edit/`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrf
              },
              body: JSON.stringify({
                member_name: this.card.member_name,
                member_email: this.card.member_email,
                member_phone: this.card.member_phone
              })
            })
            .then(response => response.json())
            .then(data => {
              if (data.ok) {
                // Use root Alpine instance for toast and modal state
                try { this.$root.toast('Card updated successfully', 'success'); } catch(e) { console.log('toast error', e); }
                try { this.$root.showRestCardModal = false; } catch(e) { /* ignore */ }

                // Update the row in the table
                const row = document.querySelector(`tr[data-card-id="${this.card.id}"]`);
                if (row) {
                  const tds = row.querySelectorAll('td');
                  // card.member_name is second cell
                  if (tds[1]) tds[1].textContent = this.card.member_name;
                  if (tds[2]) tds[2].textContent = this.card.member_email;
                  if (tds[3]) tds[3].textContent = this.card.member_phone;
                }

                // Refresh KPIs
                fetch('/dashboard/rest-cards/stats/')
                  .then(r => r.json())
                  .then(s => {
                    if (s.ok) {
                      document.getElementById('restCardsTotal').textContent = s.total;
                      document.getElementById('restCardsActive').textContent = s.active;
                      document.getElementById('restCardsPending').textContent = s.pending;
                      document.getElementById('restCardsPoints').textContent = s.total_points;
                    }
                  }).catch(err => console.error('stats error', err));

              } else {
                try { this.$root.toast(data.error, 'error'); } catch(e) { alert(data.error); }
              }
            })
            .catch(error => {
              try { this.$root.toast('Error updating card', 'error'); } catch(e) { alert('Error updating card'); }
              console.error('Error:', error);
            });
          }}">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Member Name</label>
              <input type="text" x-model="card.member_name" class="field ring-brand w-full" placeholder="Enter member name">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
              <input type="email" x-model="card.member_email" class="field ring-brand w-full" placeholder="Enter email address">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
              <input type="tel" x-model="card.member_phone" class="field ring-brand w-full" placeholder="Enter phone number">
            </div>
          </div>

          <div class="mt-6 flex justify-end gap-3">
            <button type="button" @click="showRestCardModal = false" class="btn-ghost border border-gray-300 hover:border-gray-400">Cancel</button>
            <button type="button" @click="submit()" class="btn-primary">Update Card</button>
          </div>
          </form>
        </template>
        <template x-if="!restCardModal || !restCardModal.id">
          <div class="p-4">Loading…</div>
        </template>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="fixed bottom-4 right-4 grid gap-2 z-[60]">
    <template x-for="t in toasts" :key="t.id">
      <div class=" rounded-xl px-4 py-2 shadow-soft text-sm" x-text="t.msg"></div>
    </template>
  </div>

  {% include 'dashboard/partials/scripts.html' %}
</body>
</html>
