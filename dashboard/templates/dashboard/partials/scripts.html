{# templates/dashboard/partials/scripts.html #}
{% load static %}

<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
document.addEventListener('alpine:init', () => {

  // ===== ALPINE ROOT FUNCTION =====
  window.app = function () {
    // Safe localStorage access with fallback (handles tracking prevention)
    let theme = 'dark';
    try {
      theme = localStorage.getItem('theme') || 'dark';
    } catch (e) {
      console.warn('localStorage access blocked by tracking prevention:', e);
    }

    return {
      // ===== GLOBAL STATE =====
      theme: theme,
      tab: 'overview',
      sidebarOpen: false,

      // ===== EVENT MODAL STATE =====
      showEventModal: false,
      editingEvent: false,
      eventFormAction: "{% url 'create_event' %}",
      eventForm: { id:'', name:'', description:'', location:'', date:'', thumbnail:'', flier:'' },

      // ===== CAMPAIGN MODAL STATE =====
      showCampaignModal: false,
      editingCampaign: false,
      campaignFormAction: "{% url 'create_campaign' %}",
      campaignForm: { id:'', name:'', tagline:'', description:'', start_date:'', end_date:'', vote_price:'', rest_points_per_vote:'', grand_prize:'', grand_prize_description:'', second_prize:'', second_prize_description:'', third_prize:'', third_prize_description:'', prize_description:'', banner_image:'', is_active:true },

      // ===== NOTIFICATIONS STATE =====
      notificationsOpen: true,
      notifications: [],
      
      // ===== REST CARD MODAL STATE =====
      showRestCardModal: false,
      restCardModal: {},

      // ===== NOMINEE DETAIL MODAL STATE =====
      showNomineeModal: false,
      nomineeDetail: { id: null, name: '', votes: [], votes_count: 0, total_raised: 0 },

      // ===== CHART STORAGE =====
      charts: {},

      // ===== INIT =====
       init() {
         this.bindShortcuts();
         this.$nextTick(() => {
           this.setupFormResetListener();
           // Only initialize charts if the elements exist (overview chart is visible)
           if (this.tab === 'overview' && document.getElementById('chart-overview')) {
             this.paintCharts();
           } else if (this.tab === 'charts') {
             this.hydrateCharts();
           }
         });
         this.loadNotifications();
         // start polling engagement chart data only if on overview tab
         if (this.tab === 'overview' && document.getElementById('chart-overview')) {
           setTimeout(() => {
             this.pollEngagementData();
           }, 15000); // Poll once after 15 seconds
         }
       },

      // ===== SETUP FORM RESET LISTENER =====
      setupFormResetListener() {
        const form = document.getElementById("blogForm");
        if (form) {
          form.addEventListener('reset', () => {
            // Clear thumbnail preview on reset
            const wrap = document.getElementById('thumbPreviewWrap');
            if (wrap) wrap.classList.add('hidden');
            
            // Reset form action to create URL
            const createUrl = "{% url 'blog_create' %}";
            form.action = createUrl;
          });
        }
      },

      // ===== CHART HYDRATION =====
       hydrateCharts(refresh=false) {
         // Check if any chart elements exist before proceeding
         const cat = document.getElementById('categoryChart');
         const mon = document.getElementById('monthlyChart');
         const nom = document.getElementById('nomineeChart');
         const cam = document.getElementById('campaignVotesChart');
         const vtr = document.getElementById('voteTrendsChart');
         
         if (!cat && !mon && !nom && !cam && !vtr) {
           console.warn('No chart elements found in DOM');
           return;
         }

         const categoryLabels = {{ category_chart_labels|default:"[]"|safe }};
         const categoryData   = {{ category_chart_counts|default:"[]"|safe }};
         const hydrateMonthlyLabels  = {{ monthly_chart_labels|default:"[]"|safe }};
         const hydrateMonthlyData    = {{ monthly_chart_counts|default:"[]"|safe }};
         
         // Voting charts data
         const nomineeLabels = {{ nominee_chart_labels|default:"[]"|safe }};
         const nomineeData = {{ nominee_chart_counts|default:"[]"|safe }};
         const campaignLabels = {{ campaign_vote_chart_labels|default:"[]"|safe }};
         const campaignData = {{ campaign_vote_chart_counts|default:"[]"|safe }};
         const votesMonthlyLabels = {{ votes_monthly_labels|default:"[]"|safe }};
         const votesMonthlyData = {{ votes_monthly_counts|default:"[]"|safe }};

         if (cat) {
           try {
             if (this.charts.category) {
               if (refresh) {
                 this.charts.category.destroy();
               } else {
                 return; // Chart already exists and no refresh needed
               }
             }
             this.charts.category = new Chart(cat.getContext('2d'), {
               type: 'pie',
               data: { 
                 labels: categoryLabels, 
                 datasets: [{ 
                   data: categoryData,
                   backgroundColor: [
                     'rgba(255, 99, 132, 0.8)',
                     'rgba(54, 162, 235, 0.8)',
                     'rgba(255, 206, 86, 0.8)',
                     'rgba(75, 192, 192, 0.8)',
                     'rgba(153, 102, 255, 0.8)',
                     'rgba(255, 159, 64, 0.8)'
                   ],
                   borderWidth: 2,
                   borderColor: this.theme === 'dark' ? '#1f2937' : '#fff'
                 }] 
               },
               options: { 
                 maintainAspectRatio: false, 
                 plugins: { 
                   legend: { 
                     position: 'bottom',
                     labels: {
                       color: this.theme === 'dark' ? '#e5e7eb' : '#374151',
                       font: { size: 12 }
                     }
                   } 
                 } 
               }
             });
           } catch (e) {
             console.error('Error initializing category chart:', e);
           }
         }

         if (mon) {
           try {
             if (this.charts.monthly) {
               if (refresh) {
                 this.charts.monthly.destroy();
               } else {
                 return; // Chart already exists and no refresh needed
               }
             }
             this.charts.monthly = new Chart(mon.getContext('2d'), {
               type: 'line',
               data: { 
                 labels: hydrateMonthlyLabels, 
                 datasets: [{ 
                   label: 'Posts', 
                   data: hydrateMonthlyData, 
                   tension: 0.35, 
                   fill: false,
                   borderColor: 'rgba(99, 102, 241, 1)',
                   backgroundColor: 'rgba(99, 102, 241, 0.1)',
                   borderWidth: 2,
                   pointRadius: 4,
                   pointBackgroundColor: 'rgba(99, 102, 241, 1)'
                 }] 
               },
               options: { 
                 maintainAspectRatio: false, 
                 plugins: { 
                   legend: { display: false } 
                 }, 
                 scales: { 
                   y: { 
                     beginAtZero: true, 
                     ticks: { 
                       stepSize: 1,
                       color: this.theme === 'dark' ? '#9ca3af' : '#6b7280'
                     },
                     grid: {
                       color: this.theme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                     }
                   },
                   x: {
                     ticks: {
                       color: this.theme === 'dark' ? '#9ca3af' : '#6b7280'
                     },
                     grid: {
                       color: this.theme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                     }
                   }
                 } 
               }
             });
           } catch (e) {
             console.error('Error initializing monthly chart:', e);
           }
         }

         // Nominee votes chart
         if (nom) {
           try {
             if (this.charts.nominee) {
               if (refresh) {
                 this.charts.nominee.destroy();
               } else {
                 return; // Chart already exists and no refresh needed
               }
             }
             this.charts.nominee = new Chart(nom.getContext('2d'), {
               type: 'bar',
               data: {
                 labels: nomineeLabels,
                 datasets: [{
                   label: 'Votes',
                   data: nomineeData,
                   backgroundColor: 'rgba(51, 195, 141, 0.8)',
                   borderColor: 'rgba(51, 195, 141, 1)',
                   borderWidth: 2
                 }]
               },
               options: {
                 maintainAspectRatio: false,
                 indexAxis: 'y',
                 plugins: {
                   legend: { display: false }
                 },
                 scales: {
                   x: {
                     beginAtZero: true,
                     ticks: {
                       color: this.theme === 'dark' ? '#9ca3af' : '#6b7280'
                     },
                     grid: {
                       color: this.theme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                     }
                   },
                   y: {
                     ticks: {
                       color: this.theme === 'dark' ? '#9ca3af' : '#6b7280',
                       font: { size: 11 }
                     }
                   }
                 }
               }
             });
           } catch (e) {
             console.error('Error initializing nominee chart:', e);
           }
         }

         // Campaign votes chart
         if (cam) {
           try {
             if (this.charts.campaign) {
               if (refresh) {
                 this.charts.campaign.destroy();
               } else {
                 return; // Chart already exists and no refresh needed
               }
             }
             this.charts.campaign = new Chart(cam.getContext('2d'), {
               type: 'doughnut',
               data: {
                 labels: campaignLabels,
                 datasets: [{
                   data: campaignData,
                   backgroundColor: [
                     'rgba(102, 126, 234, 0.8)',
                     'rgba(240, 114, 250, 0.8)',
                     'rgba(74, 222, 128, 0.8)',
                     'rgba(251, 146, 60, 0.8)',
                     'rgba(59, 130, 246, 0.8)'
                   ],
                   borderWidth: 2,
                   borderColor: this.theme === 'dark' ? '#1f2937' : '#fff'
                 }]
               },
               options: {
                 maintainAspectRatio: false,
                 plugins: {
                   legend: {
                     position: 'bottom',
                     labels: {
                       color: this.theme === 'dark' ? '#e5e7eb' : '#374151',
                       font: { size: 12 }
                     }
                   }
                 }
               }
             });
           } catch (e) {
             console.error('Error initializing campaign chart:', e);
           }
         }

         // Vote trends chart
         if (vtr) {
           try {
             if (this.charts.trends) {
               if (refresh) {
                 this.charts.trends.destroy();
               } else {
                 return; // Chart already exists and no refresh needed
               }
             }
             this.charts.trends = new Chart(vtr.getContext('2d'), {
               type: 'line',
               data: {
                 labels: votesMonthlyLabels,
                 datasets: [{
                   label: 'Monthly Votes',
                   data: votesMonthlyData,
                   tension: 0.4,
                   fill: true,
                   borderColor: 'rgba(14, 165, 233, 1)',
                   backgroundColor: 'rgba(14, 165, 233, 0.1)',
                   borderWidth: 2,
                   pointRadius: 5,
                   pointBackgroundColor: 'rgba(14, 165, 233, 1)',
                   pointBorderColor: '#fff',
                   pointBorderWidth: 2
                 }]
               },
               options: {
                 maintainAspectRatio: false,
                 plugins: {
                   legend: { display: false }
                 },
                 scales: {
                   y: {
                     beginAtZero: true,
                     ticks: {
                       color: this.theme === 'dark' ? '#9ca3af' : '#6b7280'
                     },
                     grid: {
                       color: this.theme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                     }
                   },
                   x: {
                     ticks: {
                       color: this.theme === 'dark' ? '#9ca3af' : '#6b7280'
                     },
                     grid: {
                       color: this.theme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                     }
                   }
                 }
               }
             });
           } catch (e) {
             console.error('Error initializing trends chart:', e);
           }
         }
       },

      // ===== GET CSRF TOKEN =====
      getCsrfToken() {
        // Try to get from form first
        const form = document.getElementById("blogForm");
        if (form) {
          const token = form.querySelector('input[name="csrfmiddlewaretoken"]')?.value;
          if (token) return token;
        }
        
        // Fallback to cookie
        const name = 'csrftoken';
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
          const [key, value] = cookie.trim().split('=');
          if (key === name) return value;
        }
        return null;
      },

      // ===== EVENT SUBMIT =====
      submitEvent() {
        const form = document.querySelector('#eventModal form');
        if (!form) return this.toast("Event form not found", "error");

        const csrf = this.getCsrfToken();
        if (!csrf) return this.toast("CSRF token missing", "error");

        const data = new FormData(form);
        const actionUrl = this.eventFormAction;

        if (!actionUrl) return this.toast("Form action URL missing", "error");

        this.toast("Saving event...", "info");

        fetch(actionUrl, {
          method: "POST",
          body: data,
          headers: {
            "X-CSRFToken": csrf
          }
        })
        .then(res => {
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          }
          return res.json();
        })
        .then(json => {
          if (json.ok) {
            this.toast("Event saved successfully!", "success");
            this.closeEventModal();
            // Refresh page to show updated data
            setTimeout(() => {
              window.location.reload();
            }, 1000);
          } else {
            this.toast(json.error || "Save failed", "error");
          }
        })
        .catch(err => {
          console.error('Submit error:', err);
          this.toast("Network error: " + err.message, "error");
        });
      },

      // ===== BLOG SUBMIT (publish OR draft) =====
      submitBlog(publish=false) {
        const form = document.getElementById("blogForm");
        if (!form) return this.toast("Blog form not found", "error");

        // Get CSRF token
        const csrf = this.getCsrfToken();
        if (!csrf) return this.toast("CSRF token missing", "error");

        const data = new FormData(form);
        data.set("action", publish ? "publish" : "draft");

        // Get the form action URL properly
        const actionUrl = form.getAttribute('action');
        if (!actionUrl) return this.toast("Form action URL missing", "error");
        
        this.toast(publish ? "Publishing..." : "Saving draft...", "info");

        fetch(actionUrl, {
          method: "POST",
          body: data,
          headers: { 
            "X-CSRFToken": csrf
          }
        })
        .then(res => {
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          }
          return res.json();
        })
        .then(json => {
          if (json.ok) {
            this.toast(
              publish ? "Blog published successfully!" : "Draft saved!", 
              "success"
            );
            
            // Reset form and switch to overview
            form.reset();
            this.tab = 'overview';
            
            // Refresh charts and reload page to show updated data
            setTimeout(() => {
              window.location.reload();
            }, 1000);
          } else {
            this.toast(json.error || "Save failed", "error");
          }
        })
        .catch(err => {
          console.error('Submit error:', err);
          this.toast("Network error: " + err.message, "error");
        });
      },

      // ===== LOAD POST INTO EDITOR =====
      loadPostIntoEditor(slug, title, content, category, isPub, isFeat) {
        this.tab = 'create_blog';
        
        this.$nextTick(() => {
          const form = document.getElementById("blogForm");
          if (!form) return this.toast("Editor form missing", "error");

          // Set form action to edit URL
          form.action = `/dashboard/blog/${slug}/edit/`;

          // Helper to set form values
          const set = (name, v) => {
            const el = form.querySelector(`[name="${name}"]`);
            if (!el) return;
            
            if (el.type === 'checkbox') {
              el.checked = v === 'True' || v === true;
            } else {
              el.value = v ?? '';
            }
            el.dispatchEvent(new Event('input', { bubbles: true }));
          };

          // Set form values
          set('title', title);
          set('category', category);
          set('content', content);
          set('is_published', isPub);
          set('is_featured', isFeat);

          this.toast("Post loaded into editor", "info");
        });
      },

      // ===== EVENT MODAL HELPERS =====
      openEventModal() {
        this.showEventModal = true;
      },

      closeEventModal() {
        this.showEventModal = false;
        this.editingEvent = false;
        this.eventForm = { id:'', name:'', description:'', location:'', date:'', thumbnail:'', flier:'' };
      },

      // ===== UI TAB HELPERS =====
       setTab(t) { 
        this.tab = t; 
        this.sidebarOpen = false;
        
        // Reset blog form when switching to create tab
        if (t === 'create_blog') {
          this.$nextTick(() => {
            const form = document.getElementById("blogForm");
            if (form) {
              form.action = "{% url 'blog_create' %}";
              form.reset();
            }
          });
        }
        
        // Initialize charts when switching to charts tab or overview tab
        if (t === 'charts' || t === 'overview') {
          this.$nextTick(() => {
            this.hydrateCharts(true);
          });
        }
      },

      // ===== ADDITIONAL FUNCTIONS FROM MAIN INDEX.HTML =====
      loadNotifications() {
        // Simulate real-time notifications
        this.notifications = [
          { id: 1, message: 'John Doe paid ₦5000 for 10 votes to Queen Joe', time: '2 minutes ago', type: 'success' },
          { id: 2, message: 'Jane Smith paid ₦10000 for 20 votes to King James', time: '5 minutes ago', type: 'success' },
          { id: 3, message: 'Mike Johnson paid ₦30000 for 60 votes to Royal Couple', time: '10 minutes ago', type: 'success' }
        ];
      },

      bindShortcuts() {
        const isTyping = (e) => {
          const el = e.target; if (!el) return false;
          const tag = el.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable) return true;
          return el.closest?.('input, textarea, [contenteditable], [role="textbox"], .ProseMirror');
        };
        window.addEventListener('keydown', (e) => {
          if (isTyping(e)) return;
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); this.toggleTheme(); return; }
          if (e.key.toLowerCase() === 'g') { this.setTab('overview'); return; }
          if (e.key.toLowerCase() === 'c') { this.setTab('charts'); return; }
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'b') { e.preventDefault(); this.setTab('blogs'); return; }
          if (e.key.toLowerCase() === 'e') { this.setTab('events'); return; }
        });
      },

      openCampaignModal() {
        this.editingCampaign = false;
        this.campaignFormAction = "{% url 'create_campaign' %}";
        this.campaignForm = { id:'', name:'', tagline:'', description:'', start_date:'', end_date:'', vote_price:'', rest_points_per_vote:'', grand_prize:'', grand_prize_description:'', second_prize:'', second_prize_description:'', third_prize:'', third_prize_description:'', prize_description:'', banner_image:'', is_active:true };
        this.showCampaignModal = true;
      },

      editCampaign(id, name, tagline, description, start_date, end_date, vote_price, rest_points_per_vote, grand_prize, grand_prize_description, second_prize, second_prize_description, third_prize, third_prize_description, prize_description, banner_image, is_active) {
        this.editingCampaign = true;
        this.campaignFormAction = `/dashboard/campaign/${id}/edit/`;
        this.campaignForm = { id, name, tagline, description, start_date, end_date, vote_price, rest_points_per_vote, grand_prize, grand_prize_description, second_prize, second_prize_description, third_prize, third_prize_description, prize_description, banner_image, is_active };
        this.showCampaignModal = true;
      },

      closeCampaignModal() { this.showCampaignModal = false; },

      // ===== NOMINEE MODAL FUNCTIONS =====
      openNomineeModal(nomineeId) {
        fetch(`/dashboard/nominees/${nomineeId}/details/`)
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              this.nomineeDetail = data.nominee;
              this.showNomineeModal = true;
            }
          })
          .catch(e => console.error('Error loading nominee:', e));
      },

      closeNomineeModal() {
        this.showNomineeModal = false;
      },

      deleteNominee(nomineeId) {
        if (!confirm('Are you sure you want to delete this nominee? This action cannot be undone.')) return;
        
        fetch(`/dashboard/nominees/${nomineeId}/delete/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              this.closeNomineeModal();
              this.toast('Nominee deleted successfully', 'success');
              // Refresh the nominees list by reloading the page or fetching fresh data
              setTimeout(() => window.location.reload(), 1000);
            } else {
              this.toast(data.error || 'Error deleting nominee', 'error');
            }
          })
          .catch(e => this.toast('Error: ' + e.message, 'error'));
      },

      deleteCampaign(slug) {
        if (!confirm('Delete this campaign? This will remove all associated nominees and votes.')) return;
        fetch(`/dashboard/voting/${slug}/delete/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              this.toast('Campaign deleted', 'success');
              setTimeout(() => window.location.reload(), 800);
            } else {
              this.toast(data.error || 'Error deleting campaign', 'error');
            }
          })
          .catch(e => this.toast('Error: ' + e.message, 'error'));
      },

      deleteVote(voteId) {
        if (!confirm('Delete this vote?')) return;
        
        fetch(`/dashboard/votes/${voteId}/delete/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value },
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              this.nomineeDetail.votes = this.nomineeDetail.votes.filter(v => v.id !== voteId);
              this.toast('Vote deleted', 'success');
            } else {
              this.toast(data.error || 'Error deleting vote', 'error');
            }
          })
          .catch(e => this.toast('Error: ' + e.message, 'error'));
      },

      addVote(nomineeId) {
        const formData = new FormData();
        const voter_name = prompt('Voter name:');
        if (!voter_name) return;
        
        const vote_quantity = parseInt(prompt('Number of votes:', '1') || '1');
        if (vote_quantity < 1) return;

        fetch('/dashboard/votes/add/', {
          method: 'POST',
          headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            nominee_id: nomineeId,
            voter_name: voter_name,
            voter_email: prompt('Voter email (optional):', 'admin@unwindafrica.com'),
            voter_phone: prompt('Voter phone (optional):', '+2348000000000'),
            vote_quantity: vote_quantity
          })
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              this.openNomineeModal(nomineeId);
              this.toast('Vote added successfully', 'success');
            } else {
              this.toast(data.error || 'Error adding vote', 'error');
            }
          })
          .catch(e => this.toast('Error: ' + e.message, 'error'));
      },

      paintCharts: function(refresh=false) {
        const fg = (this.theme === 'dark' ? '#E8ECF8' : '#0F1320');
        const grid = this.theme === 'dark' ? 'rgba(255,255,255,.08)' : 'rgba(15,19,32,.08)';
        const brand = getComputedStyle(document.documentElement).getPropertyValue('--brand') || '#8E7CFF';
        const canvas = document.getElementById('chart-overview');
        
        // Early return if canvas doesn't exist
        if (!canvas) {
          console.warn('Chart canvas element chart-overview not found');
          return;
        }
        
        // Check if canvas has context
        const ctx = canvas.getContext('2d');
        if (!ctx) {
          console.warn('Canvas context not available');
          return;
        }
        
        // Properly destroy existing chart before reinitialization
        if (this.charts.overview) {
          try {
            this.charts.overview.destroy();
          } catch (error) {
            console.error('Error destroying chart:', error);
          }
        }

        // Get data from Django template variables
        const overviewLabels = {{ monthly_chart_labels|default:"[]"|safe }};
        const overviewChartData = {{ monthly_chart_counts|default:"[]"|safe }};

        try {
          this.charts.overview = new Chart(ctx, {
            type: 'line',
            data: {
              labels: overviewLabels.length ? overviewLabels : ['No data'],
              datasets: [{
                label: 'Engagement (Votes)',
                data: overviewChartData.length ? overviewChartData : [0],
                tension: .4,
                borderColor: brand.trim() || '#8E7CFF',
                fill: true,
                backgroundColor: 'rgba(142,124,255,.18)'
              }]
            },
            options: {
              maintainAspectRatio: false,
              responsive: true,
              scales: {
                x: { grid: { color: grid }, ticks: { color: fg } },
                y: {
                  grid: { color: grid },
                  ticks: { color: fg },
                  beginAtZero: true,
                  precision: 0
                }
              },
              plugins: { legend: { labels: { color: fg } } }
            }
          });
        } catch (error) {
          console.error('Error creating chart:', error);
        }
      },

      // Fetch latest engagement data and update the overview chart in-place
      pollEngagementData() {
        // Guard: only proceed if chart exists
        if (!document.getElementById('chart-overview') || !this.charts.overview) {
          return;
        }

        fetch('/dashboard/engagement-data/')
          .then(r => {
            if (!r.ok) throw new Error('Network error');
            return r.json();
          })
          .then(json => {
            if (!json.ok || !this.charts.overview) return;
            
            const labels = json.labels || [];
            const data = json.counts || [];
            
            try {
              // Use proper data update without infinite recursion
              const chartData = this.charts.overview.data;
              if (chartData && chartData.labels && chartData.datasets && chartData.datasets[0]) {
                chartData.labels = labels;
                chartData.datasets[0].data = data;
                this.charts.overview.update('none'); // Use 'none' animation to prevent overhead
              }
            } catch (e) {
              console.error('Chart update error', e);
              // Don't repaint on error - avoid recursion
            }
          })
          .catch(err => console.error('Engagement poll error', err));
      },

      exportRestCards: function() {
        // Redirect to export endpoint
        window.location.href = '/dashboard/rest-cards/export/';
      },

          const file = e.target.files[0];

            formData.append('file', file);
            
            fetch('/dashboard/rest-cards/import/', {

                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
              }
            })
            .then(response => response.json())
            .then(data => {
              if (data.ok) {
                this.toast(`Imported ${data.imported_count} cards successfully`, 'success');
                if (data.errors.length > 0) {
                  this.toast(`${data.errors.length} errors during import`, 'error');
                }
                // Refresh the page to show updated data
                setTimeout(() => {
                  window.location.reload();
                }, 1000);
              } else {
                this.toast(data.error, 'error');

            })

              this.toast('Error importing cards', 'error');

      },
      
      editRestCard: function(cardId) {
        // Get the card data from dedicated GET endpoint
        fetch(`/dashboard/rest-cards/${cardId}/get/`, {
          method: 'GET',
        })
        .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          return response.json();
        })
        .then(data => {
          if (data.ok) {
            this.restCardModal = data.card || {};
            this.showRestCardModal = true;
          } else {
            this.toast(data.error || 'Failed to load card', 'error');
          }
        })
        .catch(error => {
          this.toast('Error loading card details', 'error');
          console.error('Error:', error);
        });
      },

      generateRestCard: function(cardId) {
        fetch(`/dashboard/rest-cards/${cardId}/generate/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
          }
        })
        .then(response => response.json())
        .then(data => {
          if (data.ok) {
            this.toast(data.message, 'success');
          } else {
            this.toast(data.error, 'error');
          }
        })
        .catch(error => {
          this.toast('Error generating card', 'error');
          console.error('Error:', error);
        });

      // Create new rest card via prompt and insert row
      createRestCard: function() {
        const name = prompt('Member name (optional)');
        const email = prompt('Member email (optional)');
        const phone = prompt('Member phone (optional)');
        const csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value || this.getCsrfToken();
        if (!csrf) return this.toast('CSRF token missing', 'error');

        fetch('/dashboard/rest-cards/create/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrf
          },
          body: JSON.stringify({ member_name: name, member_email: email, member_phone: phone })
        })
        .then(r => r.json())
        .then(data => {
          if (data.ok) {
            const c = data.card;
            // append new row to table
            const tbody = document.querySelector('table.w-full text-sm tbody') || document.querySelector('table.w-full tbody');
            const table = document.querySelector('table.w-full');
            if (table) {
              const tb = table.querySelector('tbody');
              if (tb) {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-white/5 hover:bg-white/5 transition-colors';
                tr.setAttribute('data-card-id', c.id);
                tr.innerHTML = `
                  <td class="py-3 font-mono">${c.card_number}</td>
                  <td class="py-3">${c.member_name}</td>
                  <td class="py-3">${c.member_email}</td>
                  <td class="py-3">${c.member_phone}</td>
                  <td class="py-3"><span data-status class="px-3 py-1 text-xs rounded-full bg-green-500/20 text-green-400 border border-green-500/30">${c.status}</span></td>
                  <td class="py-3">${c.total_rest_points}</td>
                  <td class="py-3">${c.activated_at}</td>
                  <td class="py-3">
                    <div class="flex gap-2">
                      <button onclick="window.app().editRestCard(${c.id})" class="text-xs btn-ghost border border-blue-400/30 hover:border-blue-400/60">Edit</button>
                      <button onclick="window.app().generateRestCard(${c.id})" class="text-xs btn-ghost border border-purple-400/30 hover:border-purple-400/60">Generate Card</button>
                      <button onclick="window.app().resendRestCard(${c.id})" class="text-xs btn-ghost border border-orange-400/30 hover:border-orange-400/60">Resend</button>
                      <button onclick="window.app().toggleRestCardStatus(${c.id}, '${c.status}', event)" class="text-xs btn-ghost border border-red-400/30 hover:border-red-400/60">Deactivate</button>
                    </div>
                  </td>`;
                tb.insertBefore(tr, tb.firstChild);
              }
            }

            // refresh KPIs
            fetch('/dashboard/rest-cards/stats/').then(r=>r.json()).then(s=>{ if(s.ok){ document.getElementById('restCardsTotal').textContent = s.total; document.getElementById('restCardsActive').textContent = s.active; document.getElementById('restCardsPending').textContent = s.pending; document.getElementById('restCardsPoints').textContent = s.total_points; } }).catch(()=>{});

            this.toast('Card created', 'success');
          } else {
            this.toast(data.error || 'Create failed', 'error');
          }
        })
        .catch(err => { console.error(err); this.toast('Network error', 'error'); });
      },

      resendRestCard: function(cardId) {
        fetch(`/dashboard/rest-cards/${cardId}/resend/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
          }
        })
        .then(response => response.json())
        .then(data => {
          if (data.ok) {
            this.toast(data.message, 'success');
          } else {
            this.toast(data.error, 'error');
          }
        })
        .catch(error => {
          this.toast('Error resending card', 'error');
          console.error('Error:', error);
        });
      },

      toggleRestCardStatus: function(cardId, currentStatus, event) {
        const csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value || this.getCsrfToken();
        if (!csrf) return this.toast('CSRF token missing', 'error');

        fetch(`/dashboard/rest-cards/${cardId}/toggle-status/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrf
          }
        })
        .then(response => response.json())
        .then(data => {
          if (data.ok) {
            this.toast(data.message, 'success');

            // Update the row using data-card-id
            const row = document.querySelector(`tr[data-card-id="${cardId}"]`);
            if (row) {
              const statusBadge = row.querySelector('[data-status]');
              if (statusBadge) {
                const newStatus = data.new_status || currentStatus;
                statusBadge.textContent = newStatus;
                // Replace classes with exact template classes
                if (newStatus === 'active') {
                  statusBadge.className = 'px-3 py-1 text-xs rounded-full bg-green-500/20 text-green-400 border border-green-500/30';
                } else if (newStatus === 'pending') {
                  statusBadge.className = 'px-3 py-1 text-xs rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
                } else if (newStatus === 'suspended') {
                  statusBadge.className = 'px-3 py-1 text-xs rounded-full bg-red-500/20 text-red-400 border border-red-500/30';
                } else {
                  statusBadge.className = 'px-3 py-1 text-xs rounded-full bg-gray-500/20 text-gray-400 border border-gray-500/30';
                }

              }

              // Update toggle button text
              const toggleBtn = row.querySelector('button[onclick], button');
              // find the button in the actions group (last button)
              const actionButtons = row.querySelectorAll('td:last-child button');
              const btn = actionButtons[actionButtons.length - 1];
              if (btn) {
                btn.textContent = (data.new_status === 'active') ? 'Deactivate' : 'Activate';
              }
            }

            // Refresh KPI counts by requesting stats endpoint
            fetch('/dashboard/rest-cards/stats/')
              .then(r => r.json())
              .then(s => {
                if (s.ok) {
                  const totalEl = document.getElementById('restCardsTotal');
                  const activeEl = document.getElementById('restCardsActive');
                  const pendingEl = document.getElementById('restCardsPending');
                  const pointsEl = document.getElementById('restCardsPoints');
                  if (totalEl) totalEl.textContent = s.total;
                  if (activeEl) activeEl.textContent = s.active;
                  if (pendingEl) pendingEl.textContent = s.pending;
                  if (pointsEl) pointsEl.textContent = s.total_points;
                }
              })
              .catch(err => console.error('Stats fetch error:', err));

          } else {
            this.toast(data.error, 'error');
          }
        })
        .catch(error => {
          this.toast('Error toggling card status', 'error');
          console.error('Error:', error);
        });
      },

      toggleTheme() {
        this.theme = this.theme === 'dark' ? 'light' : 'dark';
        try {
          localStorage.setItem('theme', this.theme);
        } catch (e) {
          console.warn('localStorage write blocked by tracking prevention:', e);
        }
        this.$nextTick(() => this.hydrateCharts(true));
      },

      // ===== TOAST SYSTEM =====
      toasts: [],
      toast(msg, type='info') {
        const id = Date.now() + Math.random();
        this.toasts.push({ id, msg, type });
        setTimeout(() => {
          this.toasts = this.toasts.filter(t => t.id !== id);
        }, 3000);
      }
    };
  };

  // Expose a small proxy to call Alpine root methods from dynamic elements
  window.appProxy = function(method, ...args) {
    try {
      const root = document.querySelector('[x-data]');
      if (!root || !root.__x) return console.warn('Alpine root not found');
      const data = root.__x.$data || root.__x.getUnobservedData?.();
      if (data && typeof data[method] === 'function') return data[method](...args);
      console.warn('Method not found on Alpine root:', method);
    } catch (e) {
      console.error('appProxy error', e);
    }
  };

  // Convenience globals for dynamic buttons
  window.generateRestCard = function(id){ return window.appProxy('generateRestCard', id); };
  window.resendRestCard = function(id){ return window.appProxy('resendRestCard', id); };
  window.toggleRestCardStatus = function(id){ return window.appProxy('toggleRestCardStatus', id); };
  window.editRestCard = function(id){ return window.appProxy('editRestCard', id); };

});
</script>

<script>
// ===== THUMBNAIL DROPZONE =====
document.addEventListener('DOMContentLoaded', function() {
  const drop = document.getElementById('thumbDrop');
  const input = document.getElementById('thumbInput');
  const wrap = document.getElementById('thumbPreviewWrap');
  const img = document.getElementById('thumbPreview');
  const nm = document.getElementById('thumbName');
  const sz = document.getElementById('thumbSize');
  const clr = document.getElementById('thumbClear');

  function kb(n) { 
    return (n/1024).toFixed(1) + ' KB'; 
  }

  function show(file) {
    if (!file.type.startsWith('image/')) {
      alert('Please select an image file');
      return;
    }
    
    const url = URL.createObjectURL(file);
    if (img) img.src = url;
    if (nm) nm.textContent = file.name;
    if (sz) sz.textContent = kb(file.size);
    if (wrap) wrap.classList.remove('hidden');
  }

  if (input) {
    input.addEventListener('change', e => {
      const f = e.target.files?.[0];
      if (f) show(f);
    });
  }

  if (drop) {
    drop.addEventListener('dragover', e => {
      e.preventDefault();
      drop.classList.add('border-[var(--brand)]', 'bg-opacity-10');
    });

    drop.addEventListener('dragleave', () => {
      drop.classList.remove('border-[var(--brand)]', 'bg-opacity-10');
    });

    drop.addEventListener('drop', e => {
      e.preventDefault();
      const f = e.dataTransfer.files?.[0];
      if (!f) return;
      
      // Create a new FileList-like object
      const dt = new DataTransfer();
      dt.items.add(f);
      input.files = dt.files;
      
      show(f);
      drop.classList.remove('border-[var(--brand)]', 'bg-opacity-10');
    });
  }

  if (clr) {
    clr.addEventListener('click', () => {
      if (input) input.value = '';
      if (wrap) wrap.classList.add('hidden');
      if (img) img.src = '';
      if (nm) nm.textContent = '';
      if (sz) sz.textContent = '—';
    });
  }
});
</script>

<script>
// ===== DELETE CONFIRMATION =====
function confirmDelete(type, identifier, name) {
  const message = `Are you sure you want to delete this ${type}?\n\n"${name}"\n\nThis action cannot be undone.`;
  if (confirm(message)) {
    const csrf = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value || '';
    if (!csrf) return alert('CSRF token missing');

    fetch(`/dashboard/${type}/${identifier}/delete/`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': csrf
      }
    })
    .then(res => res.json())
    .then(json => {
      if (json.ok) {
        alert('Deleted successfully!');
        window.location.reload();
      } else {
        alert('Delete failed: ' + (json.error || 'Unknown error'));
      }
    })
    .catch(err => {
      console.error('Delete error:', err);
      alert('Network error: ' + err.message);
    });
  }
}

// ===== TOGGLE FEATURE =====
function toggleFeature(slug) {
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = `/dashboard/blog/${slug}/toggle-feature/`;
  
  const csrfInput = document.createElement('input');
  csrfInput.type = 'hidden';
  csrfInput.name = 'csrfmiddlewaretoken';
  csrfInput.value = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value || '';
  
  form.appendChild(csrfInput);
  document.body.appendChild(form);
  form.submit();
}
</script>
