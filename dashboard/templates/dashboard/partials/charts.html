<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-2">
  <div class="glass rounded-2xl p-4 shadow-soft panel-sky">
    <h3 class="font-bold mb-2">Posts by Category</h3>
    <div class="h-[260px]"><canvas id="categoryChart"></canvas></div>
  </div>
  <div class="glass rounded-2xl p-4 shadow-soft">
    <h3 class="font-bold mb-2">Posts Published per Month</h3>
    <div class="h-[260px]"><canvas id="monthlyChart"></canvas></div>
  </div>

  <!-- Voting Charts -->
  <div class="glass rounded-2xl p-4 shadow-soft">
    <h3 class="font-bold mb-2">Top Nominees by Votes</h3>
    <div class="h-[260px]"><canvas id="nomineeChart"></canvas></div>
  </div>
  <div class="glass rounded-2xl p-4 shadow-soft">
    <h3 class="font-bold mb-2">Votes by Campaign</h3>
    <div class="h-[260px]"><canvas id="campaignVotesChart"></canvas></div>
  </div>

  <div class="glass rounded-2xl p-4 shadow-soft md:col-span-2">
    <h3 class="font-bold mb-2">Monthly Vote Trends</h3>
    <div class="h-[260px]"><canvas id="voteTrendsChart"></canvas></div>
  </div>
</div>
